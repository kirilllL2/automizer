# Глобальная конфигурация приложения
# Эти значения могут быть переопределены через переменные окружения или пользовательские конфиги

app:
  name: "Automizer"
  version: "0.1.0"
  debug: false
  log_level: "INFO"

# Пути к данным и кэшу
paths:
  data_dir: "~/.automizer/data"
  cache_dir: "~/.automizer/cache"
  config_dir: "~/.automizer/config"
  logs_dir: "~/.automizer/logs"

# Настройки базы данных (если потребуется)
database:
  type: "sqlite"
  path: "~/.automizer/data/automizer.db"

# UI настройки (для десктопного приложения)
ui:
  theme: "system"  # system, light, dark
  language: "ru"
  window:
    width: 1200
    height: 800
    min_width: 800
    min_height: 600

# Настройки нормализации окон
normalization:
  # Пресеты по умолчанию
  default_presets:
    - name: "Половина экрана слева"
      process_name: ""
      x: 0
      y: 0
      width: 960  # Будет пересчитано на основе разрешения экрана
      height: 1080
      description: "Окно на левой половине экрана"
    - name: "Половина экрана справа"
      process_name: ""
      x: 960
      y: 0
      width: 960
      height: 1080
      description: "Окно на правой половине экрана"
    - name: "Четверть экрана (верхний левый)"
      process_name: ""
      x: 0
      y: 0
      width: 960
      height: 540
      description: "Окно в верхнем левом углу"

# Настройки скриншотов
screenshot:
  # Длительность показа красного квадрата перед захватом (в секундах)
  preview_duration: 1.0
  # Путь для хранения скриншотов (по умолчанию ~/.automizer/data/screenshots)
  storage_dir: "~/.automizer/data/screenshots"

# Настройки компьютерного зрения (CV)
cv:
  # Порог уверенности для поиска совпадений (0.0 - 1.0)
  confidence_threshold: 0.8
  # Таймаут поиска в секундах
  search_timeout: 5.0
  # Длительность показа превью найденной области (в секундах)
  preview_duration: 2.0

# Настройки макросов
macros:
  # Процент от центра области для клика по умолчанию (0.0 - 1.0)
  # 0.0 = вся область, 1.0 = только центр, 0.3 = 30% от центра
  default_click_percent: 0.3
